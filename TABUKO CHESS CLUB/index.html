<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tabuko Chess Club — Tournament Management System with FIDE-compliant Swiss pairing, tie-breaks, and team tournaments.">
  <title>Tabuko Chess Club — Tournament Manager</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♞</text></svg>">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#3b82f6">
</head>
<body>
  <!-- Loading Overlay -->
  <div id="loading-overlay"><div class="spinner"></div></div>

  <!-- App Root -->
  <div id="app"></div>

  <!-- Global Modal Container -->
  <div id="modal-container"></div>

  <!-- Morphdom for efficient DOM patching -->
  <script src="https://unpkg.com/morphdom@2.6.1/dist/morphdom-umd.js"></script>

  <!-- Firebase SDK (v9 Compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-functions-compat.js"></script>

  <!-- 1. Configuration (The Root) -->
  <script src="./js/firebase-config.js"></script>

  <!-- 2. Foundational Data Modules -->
  <script src="./js/db.js"></script>
  <script src="./js/club-members.js"></script>
  <script src="./js/audit-log.js"></script>
  <script src="./js/rating.js"></script>

  <!-- 3. Authentication (Depends on DB) -->
  <script src="./js/auth.js"></script>

  <!-- 4. FIDE Engines & Mathematical Logic -->
  <script src="./js/tiebreak.js"></script>
  <script src="./js/tie-resolution.js"></script>
  <script src="./js/pairing-swiss.js"></script>
  <script src="./js/pairing-team.js"></script>
  <script src="./js/pairing-round-robin.js"></script>
  <script src="./js/pairing-round-robin-team.js"></script>
  <script src="./js/standings.js?v=2.2.7"></script>
  <script src="./js/teamStandings.js?v=2.2.7"></script>
  <script src="./js/tournament.js?v=2.2.7"></script>
  <script src="./js/functions-client.js"></script>
  <!-- 5. UI Rendering & Advanced Tactical Engines -->
  <script src="./js/PlayerRegistry.js?v=2.2.7"></script>
  <script src="./js/IdentityResolution.js?v=2.2.7"></script>
  <script src="./js/EloEngine.js?v=2.2.7"></script>
  <script src="./js/OperationsQueue.js?v=2.2.7"></script>
  <script src="./js/SnapshotManager.js?v=2.2.7"></script>
  <script src="./js/PerformanceAnalytics.js?v=2.2.7"></script>
  <script src="./js/QRGenerator.js?v=2.2.7"></script>
  <script src="./js/ui_v228.js?v=2.2.8"></script>

  <!-- 6. Main Entry Point (Router) -->
  <script src="./js/app.js"></script>

  <!-- External Plugins -->
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <!-- PWA Service Worker (With Automatic Purge for Deleted Modules) -->
  <script>
    if ('serviceWorker' in navigator) {
      // FORCE PURGE: If you see "Unexpected token <", it's because of stale SW cache.
      // We unregister everything to force a clean slate.
      navigator.serviceWorker.getRegistrations().then(registrations => {
        for(let registration of registrations) {
          registration.unregister();
          console.log('[PWA] Stale Service Worker Unregistered');
        }
      });

      // Also clear all caches
      if (window.caches) {
        caches.keys().then(names => {
          for (let name of names) caches.delete(name);
          console.log('[PWA] Caches Purged');
        });
      }

      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(reg => {
          console.log('[PWA] New Service Worker Registered:', reg.scope);
        }).catch(err => {
          console.error('[PWA] Registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
